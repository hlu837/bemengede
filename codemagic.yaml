workflows:
  default-workflow:
    name: Default Workflow
    working_directory: app
    environment:
      flutter: stable
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build Android
        script: flutter build apk --release
    artifacts:
      - app/build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/flutter-apk/*.apk
      - "**/*.apk"
