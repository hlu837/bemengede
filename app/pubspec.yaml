name: bemengede
description: Bemengede - Package Delivery Marketplace
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.5.0
  pointer_interceptor: ^0.10.1

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # UI
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0

  # HTTP / API
  http: ^1.2.1
  dio: ^5.4.3+1

  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3

  # Forms & Validation
  flutter_form_builder: ^10.3.0
  form_builder_validators: ^11.0.0

  # Maps & Location
  geolocator: ^12.0.0
  permission_handler: ^11.3.1
  gebeta_gl: ^0.22.4

  # Utils
  intl: ^0.20.0
  url_launcher: ^6.2.5
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/